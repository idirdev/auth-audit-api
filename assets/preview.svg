<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0f1117" rx="12"/>
  <!-- Terminal window -->
  <rect x="60" y="30" width="1080" height="570" rx="12" fill="#1a1d27" stroke="#2a2d3a" stroke-width="1"/>
  <rect x="60" y="30" width="1080" height="36" rx="12" fill="#22252f"/>
  <circle cx="86" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="106" cy="48" r="6" fill="#febc2e"/>
  <circle cx="126" cy="48" r="6" fill="#28c840"/>
  <text x="600" y="53" font-family="monospace" font-size="12" fill="#6b7280" text-anchor="middle">auth-audit-api v1.0.0</text>
  <!-- API Endpoints listing -->
  <text x="90" y="96" font-family="monospace" font-size="14" fill="#10b981" font-weight="bold">AUTH AUDIT API</text>
  <text x="90" y="116" font-family="monospace" font-size="11" fill="#6b7280">Production-grade authentication and audit logging</text>
  <line x1="90" y1="130" x2="1100" y2="130" stroke="#2a2d3a" stroke-width="1"/>
  <!-- Auth routes -->
  <text x="90" y="155" font-family="monospace" font-size="12" fill="#6b7280">ROUTES</text>
  <rect x="90" y="170" width="52" height="20" rx="4" fill="#10b98130"/>
  <text x="116" y="184" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">POST</text>
  <text x="152" y="184" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/auth/register</text>
  <text x="480" y="184" font-family="monospace" font-size="11" fill="#6b7280">Create account</text>
  <rect x="90" y="198" width="52" height="20" rx="4" fill="#10b98130"/>
  <text x="116" y="212" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">POST</text>
  <text x="152" y="212" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/auth/login</text>
  <text x="480" y="212" font-family="monospace" font-size="11" fill="#6b7280">JWT + refresh token</text>
  <rect x="90" y="226" width="52" height="20" rx="4" fill="#10b98130"/>
  <text x="116" y="240" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">POST</text>
  <text x="152" y="240" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/auth/refresh</text>
  <text x="480" y="240" font-family="monospace" font-size="11" fill="#6b7280">Rotate tokens</text>
  <rect x="90" y="254" width="52" height="20" rx="4" fill="#3b82f630"/>
  <text x="116" y="268" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GET</text>
  <text x="152" y="268" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/users</text>
  <text x="480" y="268" font-family="monospace" font-size="11" fill="#6b7280">List users (paginated)</text>
  <rect x="780" y="259" width="50" height="16" rx="4" fill="#ef444430"/>
  <text x="805" y="271" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">ADMIN</text>
  <rect x="90" y="282" width="52" height="20" rx="4" fill="#3b82f630"/>
  <text x="116" y="296" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GET</text>
  <text x="152" y="296" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/audit</text>
  <text x="480" y="296" font-family="monospace" font-size="11" fill="#6b7280">Audit logs (filtered)</text>
  <rect x="780" y="287" width="50" height="16" rx="4" fill="#ef444430"/>
  <text x="805" y="299" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">ADMIN</text>
  <rect x="90" y="310" width="52" height="20" rx="4" fill="#10b98130"/>
  <text x="116" y="324" font-family="monospace" font-size="10" fill="#10b981" text-anchor="middle">POST</text>
  <text x="152" y="324" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/webhooks</text>
  <text x="480" y="324" font-family="monospace" font-size="11" fill="#6b7280">Register webhook</text>
  <rect x="90" y="338" width="52" height="20" rx="4" fill="#3b82f630"/>
  <text x="116" y="352" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle">GET</text>
  <text x="152" y="352" font-family="monospace" font-size="12" fill="#e5e7eb">/api/v1/health</text>
  <text x="480" y="352" font-family="monospace" font-size="11" fill="#6b7280">Health + readiness</text>
  <line x1="90" y1="375" x2="1100" y2="375" stroke="#2a2d3a" stroke-width="1"/>
  <!-- Features panel -->
  <text x="90" y="400" font-family="monospace" font-size="12" fill="#6b7280">STACK</text>
  <rect x="90" y="415" width="120" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="150" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">Express</text>
  <rect x="220" y="415" width="120" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="280" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">PostgreSQL</text>
  <rect x="350" y="415" width="120" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="410" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">Drizzle ORM</text>
  <rect x="480" y="415" width="120" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="540" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">TypeScript</text>
  <rect x="610" y="415" width="80" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="650" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">Zod</text>
  <rect x="700" y="415" width="80" height="24" rx="6" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="740" y="432" font-family="monospace" font-size="11" fill="#e5e7eb" text-anchor="middle">JWT</text>
  <!-- Features list -->
  <text x="90" y="475" font-family="monospace" font-size="12" fill="#6b7280">FEATURES</text>
  <text x="110" y="498" font-family="monospace" font-size="11" fill="#10b981">+</text>
  <text x="128" y="498" font-family="monospace" font-size="11" fill="#d1d5db">JWT auth with refresh token rotation</text>
  <text x="110" y="518" font-family="monospace" font-size="11" fill="#10b981">+</text>
  <text x="128" y="518" font-family="monospace" font-size="11" fill="#d1d5db">RBAC (superadmin, admin, editor, viewer)</text>
  <text x="110" y="538" font-family="monospace" font-size="11" fill="#10b981">+</text>
  <text x="128" y="538" font-family="monospace" font-size="11" fill="#d1d5db">Audit logging on every mutation</text>
  <text x="110" y="558" font-family="monospace" font-size="11" fill="#10b981">+</text>
  <text x="128" y="558" font-family="monospace" font-size="11" fill="#d1d5db">Rate limiting, Zod validation, Swagger docs</text>
  <text x="110" y="578" font-family="monospace" font-size="11" fill="#10b981">+</text>
  <text x="128" y="578" font-family="monospace" font-size="11" fill="#d1d5db">Background job queue, webhook system</text>
  <!-- Right side: DB Schema -->
  <rect x="680" y="460" width="440" height="120" rx="10" fill="#22252f" stroke="#2a2d3a" stroke-width="1"/>
  <text x="700" y="485" font-family="monospace" font-size="12" fill="#6b7280">DB SCHEMA (7 tables)</text>
  <text x="700" y="508" font-family="monospace" font-size="11" fill="#8b5cf6">users</text>
  <text x="780" y="508" font-family="monospace" font-size="11" fill="#8b5cf6">sessions</text>
  <text x="880" y="508" font-family="monospace" font-size="11" fill="#8b5cf6">permissions</text>
  <text x="700" y="530" font-family="monospace" font-size="11" fill="#8b5cf6">audit_logs</text>
  <text x="810" y="530" font-family="monospace" font-size="11" fill="#8b5cf6">webhooks</text>
  <text x="910" y="530" font-family="monospace" font-size="11" fill="#8b5cf6">jobs</text>
  <text x="700" y="552" font-family="monospace" font-size="11" fill="#8b5cf6">password_resets</text>
  <text x="860" y="552" font-family="monospace" font-size="11" fill="#8b5cf6">role_permissions</text>
</svg>
