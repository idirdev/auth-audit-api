<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <!-- Browser chrome -->
  <rect width="1200" height="700" fill="#1a1a1a" rx="12"/>
  <rect width="1200" height="44" fill="#2a2a2a" rx="12"/>
  <rect y="32" width="1200" height="12" fill="#2a2a2a"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>
  <rect x="200" y="10" width="400" height="24" rx="12" fill="#333"/>
  <text x="400" y="27" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle">localhost:4000/docs</text>

  <!-- Swagger UI background -->
  <rect x="0" y="44" width="1200" height="656" fill="#1a1a1a"/>

  <!-- Header bar -->
  <rect x="0" y="44" width="1200" height="56" fill="#222"/>
  <rect x="30" y="56" width="32" height="32" rx="6" fill="#85ea2d"/>
  <text x="46" y="78" font-family="system-ui,sans-serif" font-size="16" fill="#1a1a1a" text-anchor="middle" font-weight="bold">S</text>
  <text x="76" y="78" font-family="system-ui,sans-serif" font-size="18" fill="white" font-weight="600">Auth Audit API</text>
  <text x="240" y="78" font-family="system-ui,sans-serif" font-size="13" fill="#85ea2d">v1.0.0</text>
  <text x="300" y="78" font-family="system-ui,sans-serif" font-size="13" fill="#aaa">OAS 3.0</text>

  <!-- Base URL -->
  <rect x="30" y="112" width="300" height="28" rx="6" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="45" y="130" font-family="monospace" font-size="12" fill="#85ea2d">http://localhost:4000/api/v1</text>

  <!-- Auth section -->
  <rect x="30" y="158" width="1140" height="40" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="50" y="183" font-family="system-ui,sans-serif" font-size="16" fill="white" font-weight="600">Authentication</text>
  <text x="190" y="183" font-family="system-ui,sans-serif" font-size="12" fill="#888">Register, login, token management</text>

  <!-- POST /auth/register -->
  <rect x="50" y="210" width="1100" height="44" rx="6" fill="#10b98115" stroke="#10b98140" stroke-width="1"/>
  <rect x="62" y="220" width="52" height="24" rx="4" fill="#10b981"/>
  <text x="88" y="236" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="126" y="237" font-family="monospace" font-size="13" fill="#e5e7eb">/auth/register</text>
  <text x="600" y="237" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Create a new user account</text>

  <!-- POST /auth/login -->
  <rect x="50" y="262" width="1100" height="44" rx="6" fill="#10b98115" stroke="#10b98140" stroke-width="1"/>
  <rect x="62" y="272" width="52" height="24" rx="4" fill="#10b981"/>
  <text x="88" y="288" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="126" y="289" font-family="monospace" font-size="13" fill="#e5e7eb">/auth/login</text>
  <text x="600" y="289" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Authenticate and get JWT tokens</text>
  <rect x="1060" y="275" width="72" height="20" rx="4" fill="#33333380"/>
  <text x="1096" y="289" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">200 / 401</text>

  <!-- POST /auth/refresh -->
  <rect x="50" y="314" width="1100" height="44" rx="6" fill="#10b98115" stroke="#10b98140" stroke-width="1"/>
  <rect x="62" y="324" width="52" height="24" rx="4" fill="#10b981"/>
  <text x="88" y="340" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="126" y="341" font-family="monospace" font-size="13" fill="#e5e7eb">/auth/refresh</text>
  <text x="600" y="341" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Rotate access and refresh tokens</text>

  <!-- POST /auth/logout -->
  <rect x="50" y="366" width="1100" height="44" rx="6" fill="#10b98115" stroke="#10b98140" stroke-width="1"/>
  <rect x="62" y="376" width="52" height="24" rx="4" fill="#10b981"/>
  <text x="88" y="392" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">POST</text>
  <text x="126" y="393" font-family="monospace" font-size="13" fill="#e5e7eb">/auth/logout</text>
  <text x="600" y="393" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Revoke current session</text>
  <rect x="1010" y="379" width="40" height="20" rx="4" fill="#f59e0b20"/>
  <text x="1030" y="393" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">AUTH</text>

  <!-- Users section -->
  <rect x="30" y="426" width="1140" height="40" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="50" y="451" font-family="system-ui,sans-serif" font-size="16" fill="white" font-weight="600">Users</text>
  <text x="110" y="451" font-family="system-ui,sans-serif" font-size="12" fill="#888">User management and RBAC</text>

  <!-- GET /users -->
  <rect x="50" y="478" width="1100" height="44" rx="6" fill="#3b82f615" stroke="#3b82f640" stroke-width="1"/>
  <rect x="62" y="488" width="52" height="24" rx="4" fill="#3b82f6"/>
  <text x="88" y="504" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <text x="126" y="505" font-family="monospace" font-size="13" fill="#e5e7eb">/users</text>
  <text x="600" y="505" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">List all users (paginated)</text>
  <rect x="1010" y="491" width="50" height="20" rx="4" fill="#ef444420"/>
  <text x="1035" y="505" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">ADMIN</text>

  <!-- GET /users/me -->
  <rect x="50" y="530" width="1100" height="44" rx="6" fill="#3b82f615" stroke="#3b82f640" stroke-width="1"/>
  <rect x="62" y="540" width="52" height="24" rx="4" fill="#3b82f6"/>
  <text x="88" y="556" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GET</text>
  <text x="126" y="557" font-family="monospace" font-size="13" fill="#e5e7eb">/users/me</text>
  <text x="600" y="557" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Get current authenticated user</text>
  <rect x="1010" y="543" width="40" height="20" rx="4" fill="#f59e0b20"/>
  <text x="1030" y="557" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">AUTH</text>

  <!-- PATCH /users/:id/role -->
  <rect x="50" y="582" width="1100" height="44" rx="6" fill="#f59e0b15" stroke="#f59e0b40" stroke-width="1"/>
  <rect x="62" y="592" width="52" height="24" rx="4" fill="#f59e0b"/>
  <text x="88" y="608" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">PATCH</text>
  <text x="126" y="609" font-family="monospace" font-size="13" fill="#e5e7eb">/users/:id/role</text>
  <text x="600" y="609" font-family="system-ui,sans-serif" font-size="12" fill="#aaa">Update user role (RBAC)</text>
  <rect x="1010" y="595" width="80" height="20" rx="4" fill="#ef444420"/>
  <text x="1050" y="609" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">SUPERADMIN</text>

  <!-- Audit section hint -->
  <rect x="30" y="642" width="1140" height="40" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="50" y="667" font-family="system-ui,sans-serif" font-size="16" fill="white" font-weight="600">Audit Logs</text>
  <text x="170" y="667" font-family="system-ui,sans-serif" font-size="12" fill="#888">Query audit trail and statistics</text>
  <text x="1140" y="667" font-family="system-ui,sans-serif" font-size="18" fill="#555" text-anchor="end">+</text>
</svg>